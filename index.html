<!DOCTYPE html>
<html lang="zh-hant">
    <!--CK77th郭醫德製作-->
    <!--CK78th吳宣熤修改-->
    <head>
        <title>多肉選擇小幫手（維護中）</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/earlyaccess/cwtexming.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <link rel="icon" href="icon.png" type="image/x-icon">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
        <script src="js.js"></script>
        <script src="back-to-top.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
          <div class="logo">
            <h1>多肉選擇小幫手（維護中）</h1>
          </div>
        </header>
        <div class="container">
            <div class="fadeIn divider"></div>
            <h1 id="key" hidden></h1>
            <div class="fadeIn">
                <h2>已選擇：<span id="showplace"></span></h2>
            </div>
            <div class="flexbox fadeIn">
                <ul id="0">
                    <li><button onclick="change(1)">平地</button></li>
                    <li><button onclick="change(2)">山邊</button></li>
                </ul>
                <ul id="1" hidden>
                    <li><button onclick="change(1)">室內</button></li>
                    <li><button onclick="change(2)">室外</button></li>
                </ul>
                <!--第二層-->
                <ul id="21" hidden>
                    <li><button onclick="change(1)">窗台</button></li>
                    <li><button onclick="change(2)">無窗</button></li>
                </ul>
                <ul id="22" hidden>
                    <li><button onclick="change(3)">陽台</button></li>
                    <li><button onclick="change(4)">露臺</button></li>
                </ul>
                <!--第三層-->
                <ul id="3" hidden>
                    <li><button onclick="change(1)">東</button></li>
                    <li><button onclick="change(2)">西</button></li>
                    <li><button onclick="change(3)">南</button></li>
                    <li><button onclick="change(4)">北</button></li>
                </ul>
                <!--第四層-->
                <ul id="4" hidden>
                    <li><button onclick="change(1)">盆身深(&gt12cm)</button></li>
                    <li><button onclick="change(2)">盆身淺(&lt12cm)</button></li>
                    <li><button onclick="change(3)">略過盆器挑選</button></li>
                </ul>
                <!--第四層-->
                <ul id="5" hidden>
                    <li><button onclick="change(1)">盆口寬(&gt100㎠)</button></li>
                    <li><button onclick="change(2)">盆口窄(&lt100㎠)</button></li>
                </ul>
            </div>
            <div id="contbtn" class=" flexbox fadeIn" style="display:none;">
                <button id="prevbtn" class="contbtn" onclick="prev()">上一步</button>
                <button id="resetbtn" class="contbtn" onclick="reset()">重填</button>
            </div>
            <div id="ansbox" class="fadeIn" style="display:none;position:relative;">
                <p id="show2pot" hidden></p>
            </div>
            <div class="fadeIn divider"></div>
            <div id="cactusesbox" class="fadeIn" style="display:none;">
                <h2>適合種植的多肉品種（<span id="show"></span><span id="showpot"></span>）：</h2>
            </div>
            <div class="fadeIn divider"></div>
            <h2>資料來源：</h2>
            <p>建國中學 陳宣義老師</p>
        </div>
        <button id="backToTop" class="back-to-top">↑</button>
        <script>constructIntro();</script>
    </body>
</html>
