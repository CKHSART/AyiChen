<!DOCTYPE html>
<html lang="zh-hant">
    <!--CK77th郭醫德製作-->
    <!--CK78th吳宣熤修改-->
    <head>
        <title>多肉選擇小幫手</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/earlyaccess/cwtexming.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <link rel="icon" href="icon.png" type="image/x-icon">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
        <script src="js.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="logo">
                <div class="flex-container-top">
                    <h1>多肉選擇小幫手</h1>
                    <!--<button onclick="showRoute()">選擇路徑圖</button>-->
                    <img src="./logo_img.png" alt="翻轉空間造化美！" class="img-logo-top">
                </div>
            </div>
        </header>
        <div class="container">
            <hr>
            <h1 id="key" hidden></h1>
            <div class="fadeIn">
                <h2>已選擇：<span id="showplace"></span></h2>
            </div>
            <div class="flexbox fadeIn">
                <div id="0">
                    <button onclick="change('1')">平地</button>
                    <button onclick="change('2')">山邊</button>
                    <button onclick="change('3')">直接查看全部</button>
                </div>
                <div id="1" hidden>
                    <button onclick="change('1')">室內</button>
                    <button onclick="change('2')">室外</button>
                </div>
                <!--第二層-->
                <div id="21" hidden>
                    <button onclick="change('1')">窗台</button>
                    <button onclick="change('2')">無窗</button>
                </div>
                <div id="22" hidden>
                    <button onclick="change('3')">陽台</button>
                    <button onclick="change('4')">露臺</button>
                </div>
                <!--第三層-->
                <div id="3" hidden>
                    <button onclick="change('1')">東</button>
                    <button onclick="change('2')">西</button>
                    <button onclick="change('3')">南</button>
                    <button onclick="change('4')">北</button>
                </div>
                <!--第四層-->
                <div id="4" hidden>
                    <button onclick="change('1')">盆口寬(&gt100㎠)</button>
                    <button onclick="change('2')">盆口窄(&lt100㎠)</button>
                    <button onclick="change('3')">略過盆器挑選</button>
                </div>
                <!--第四層-->
                <div id="5" hidden>
                    <button onclick="change('1')">盆身深(&gt12cm)</button>
                    <button onclick="change('2')">盆身淺(&lt12cm)</button>
                </div>
            </div>
            <div id="contbtn" class=" flexbox fadeIn" style="display:none;">
                <button id="prevbtn" class="contbtn" onclick="prev()">上一步</button>
                <button id="resetbtn" class="contbtn" onclick="reset()">重填</button>
            </div>
            <div id="ansbox" class="fadeIn" style="display:none;position:relative;">
                <p id="show2pot" hidden></p>
            </div>
            <div id="cactusesbox" class="fadeIn" style="display:none;">
                <hr>
                <h2>適合種植的多肉品種（<span id="show"></span><span id="showpot"></span>）：</h2>
                <div class="flexbox">
                    <button id="combinationBtn_all" class="combinationBtn" onclick="show('all')">全部</button>
                    <button id="combinationBtn_A" class="combinationBtn" onclick="show('A')">A</button>
                    <button id="combinationBtn_B" class="combinationBtn" onclick="show('B')">B</button>
                    <button id="combinationBtn_C" class="combinationBtn" onclick="show('C')">C</button>
                    <button id="combinationBtn_D" class="combinationBtn" onclick="show('D')">D</button>
                    <button id="combinationBtn_E" class="combinationBtn" onclick="show('E')">E</button>
                </div>
                <div class="flexbox">
                    <button onclick="openAll()">展開全部</button>
                    <button onclick="closeAll()">收合全部</button>
                </div>
            </div>
            <hr>
            <div class="flex-container-bottom">
                <div>
                    <h2>多肉資料來源：</h2>
                    <p>建國中學 陳宣義老師</p>
                </div>
                <div>
                    <h2>網頁製作：</h2>
                    <p>建國中學77th 326 郭醫德</p>
                    <p>建國中學78th 327 吳宣熤</p>
                </div>
                <div class="img-logo-bottom">
                    <img src="./logo_text.png" alt="翻轉空間造化美！" class="img-logo-bottom">
                </div>
            </div>
        </div>
        <button id="backToTop" class="back-to-top">↑</button>
        <dialog id="introBox" class="custom-modal">
          <div id="introBoxDiv"></div>
          <button id="closeBtn" onclick="closeIntroBox();">關閉</button>
        </dialog>
        <script>constructIntro();</script>
        <script src="back-to-top.js"></script>
        <script src="onclick.js"></script>
    </body>
</html>
